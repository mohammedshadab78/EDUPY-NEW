<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPy – Recover Your Password</title>
  <link rel="icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --purple: #6C63FF;
      --purple-dk: #4B44CC;
      --purple-lt: #a09bff;
      --coral: #FF6B6B;
      --coral-dk: #CC4444;
      --mint-dk: #33A89F;
      --bg: #F4F7FD;
      --card: #FFFFFF;
      --text: #1E1B4B;
      --muted: #5B5B7A;
      --border: rgba(108,99,255,0.15);
      --shadow: 0 12px 32px rgba(0,0,0,0.05), 0 2px 0 rgba(108,99,255,0.08);
      --r-xl: 24px;
      --r-lg: 16px;
      --ease: cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #F0F4FF 0%, #FFF0F5 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* ─── CARD LAYOUT ─── */
    .recover-container {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border-radius: var(--r-xl);
      padding: 2.5rem 2.2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      animation: popIn 0.5s var(--ease) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(15px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .recover-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--purple), var(--coral));
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--purple), var(--coral));
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      color: #fff;
      box-shadow: 0 3px 0 var(--purple-dk);
    }

    .header-text {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-text h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .header-text p {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ─── FORM CONTROLS ─── */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 0.4rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1.1rem;
      border-radius: var(--r-lg);
      border: 2px solid rgba(108, 99, 255, 0.15);
      background: #F8FAFC;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--purple);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      border-radius: var(--r-lg);
      border: none;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      background: var(--purple);
      color: #fff;
      box-shadow: 0 4px 0 var(--purple-dk), 0 8px 16px rgba(108, 99, 255, 0.2);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--purple-dk), 0 12px 20px rgba(108, 99, 255, 0.28);
    }

    .btn-submit:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--purple-dk);
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 500;
    }

    .auth-footer a {
      color: var(--purple);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.15s;
    }

    .auth-footer a:hover {
      color: var(--purple-dk);
      text-decoration: underline;
    }

    /* ─── FEEDBACK ALERTS ─── */
    .alert-box {
      border-radius: var(--r-lg);
      padding: 0.8rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      line-height: 1.4;
    }

    .alert-box.error {
      background: rgba(255, 107, 107, 0.08);
      border: 1.5px solid rgba(255, 107, 107, 0.3);
      color: #CC4444;
      animation: shake 0.3s ease;
    }

    .alert-box.success {
      background: rgba(78, 205, 196, 0.08);
      border: 1.5px solid rgba(78, 205, 196, 0.3);
      color: var(--mint-dk);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body>

  <a href="index.html" class="brand">
    <div class="brand-icon">Py</div>
    <span>EduPy</span>
  </a>

  <div class="recover-container">
    <div class="header-text">
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send you a link to choose a new password.</p>
    </div>

    <!-- Feedback Container -->
    <div class="alert-box" id="feedbackBox">
      <span id="feedbackIcon" style="font-size: 1.1rem; flex-shrink: 0;">⚠️</span>
      <span id="feedbackMsg">Something went wrong.</span>
    </div>

    <!-- Form -->
    <form id="recoverForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="input-field" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <button class="btn-submit" type="submit" id="submitBtn">
        <span>📧 Send Reset Link</span>
      </button>
    </form>

    <div class="auth-footer">
      Remembered your password? <a href="login.html">Sign in here →</a>
    </div>
  </div>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const recoverForm = document.getElementById('recoverForm');
    const submitBtn   = document.getElementById('submitBtn');
    const feedbackBox = document.getElementById('feedbackBox');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const feedbackIcon = document.getElementById('feedbackIcon');

    function showFeedback(msg, type = 'error') {
      feedbackMsg.textContent = msg;
      feedbackBox.className = 'alert-box ' + type;
      feedbackIcon.textContent = type === 'error' ? '⚠️' : '✅';
      feedbackBox.style.display = 'flex';
      
      if (type === 'error') {
        feedbackBox.style.animation = 'none';
        void feedbackBox.offsetWidth; // Trigger reflow
        feedbackBox.style.animation = 'shake 0.3s ease';
      }
    }

    function hideFeedback() {
      feedbackBox.style.display = 'none';
    }

    recoverForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideFeedback();
      
      const email = document.getElementById('email').value.trim();
      
      submitBtn.disabled = true;
      const origText = submitBtn.innerHTML;
      submitBtn.innerHTML = '⏳ Sending email...';

      // Wait for Firebase to finish initializing
      await window.firebaseReady;

      try {
        await window.auth.sendPasswordResetEmail(email);
        submitBtn.disabled = false;
        submitBtn.innerHTML = origText;
        showFeedback("Reset link sent! Please check your email inbox and spam folder.", "success");
        recoverForm.reset();
      } catch (error) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = origText;
        console.error("Password recovery error:", error);
        
        switch (error.code) {
          case 'auth/user-not-found':
            showFeedback("No account exists with this email address.");
            break;
          case 'auth/invalid-email':
            showFeedback("Please enter a valid email address.");
            break;
          default:
            showFeedback("Failed to send reset email: " + error.message);
        }
      }
    });
  </script>
</body>
</html>
