<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPy – Create Your Account</title>
  <link rel="icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --purple: #6C63FF;
      --purple-dk: #4B44CC;
      --purple-lt: #a09bff;
      --coral: #FF6B6B;
      --coral-dk: #CC4444;
      --bg: #F4F7FD;
      --card: #FFFFFF;
      --text: #1E1B4B;
      --muted: #5B5B7A;
      --border: rgba(108,99,255,0.15);
      --shadow: 0 12px 32px rgba(0,0,0,0.05), 0 2px 0 rgba(108,99,255,0.08);
      --r-xl: 24px;
      --r-lg: 16px;
      --ease: cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #F0F4FF 0%, #FFF0F5 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* ─── CARD LAYOUT ─── */
    .register-container {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border-radius: var(--r-xl);
      padding: 2.5rem 2.2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      animation: popIn 0.5s var(--ease) forwards;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95) translateY(15px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Top decorative gradient bar */
    .register-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--purple), var(--coral));
    }

    /* ─── BRAND HEADER ─── */
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--purple), var(--coral));
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.9rem;
      color: #fff;
      box-shadow: 0 3px 0 var(--purple-dk);
    }

    .header-text {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-text h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .header-text p {
      font-size: 0.86rem;
      color: var(--muted);
    }

    /* ─── FORM CONTROLS ─── */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 0.4rem;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1.1rem;
      border-radius: var(--r-lg);
      border: 2px solid rgba(108, 99, 255, 0.15);
      background: #F8FAFC;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .input-field:focus {
      border-color: var(--purple);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
    }

    /* ─── BUTTONS ─── */
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      border-radius: var(--r-lg);
      border: none;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      background: var(--purple);
      color: #fff;
      box-shadow: 0 4px 0 var(--purple-dk), 0 8px 16px rgba(108, 99, 255, 0.2);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--purple-dk), 0 12px 20px rgba(108, 99, 255, 0.28);
    }

    .btn-submit:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--purple-dk);
    }

    /* ─── FOOTER LINK ─── */
    .auth-footer {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.86rem;
      color: var(--muted);
      font-weight: 500;
    }

    .auth-footer a {
      color: var(--purple);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.15s;
    }

    .auth-footer a:hover {
      color: var(--purple-dk);
      text-decoration: underline;
    }

    /* ─── ERROR & TOASTS ─── */
    .error-box {
      background: rgba(255, 107, 107, 0.08);
      border: 1.5px solid rgba(255, 107, 107, 0.3);
      border-radius: var(--r-lg);
      padding: 0.8rem 1rem;
      color: #CC4444;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      line-height: 1.4;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e1b4b;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 40px;
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      z-index: 1000;
      transition: transform 0.35s var(--ease), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Brand logo redirecting to home -->
  <a href="index.html" class="brand">
    <div class="brand-icon">Py</div>
    <span>EduPy</span>
  </a>

  <div class="register-container">
    <div class="header-text">
      <h1>Create Account</h1>
      <p>Start your Python learning adventure</p>
    </div>

    <!-- Error container -->
    <div class="error-box" id="errorBox">
      <span style="font-size: 1.1rem; flex-shrink: 0;">⚠️</span>
      <span id="errorMsg">Passwords do not match!</span>
    </div>

    <!-- Form -->
    <form id="registerForm">
      <div class="form-group">
        <label class="form-label" for="fullname">Full Name</label>
        <input class="input-field" type="text" id="fullname" placeholder="e.g. Mohammed Shadab" required autocomplete="name" maxlength="50">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="input-field" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="input-field" type="password" id="password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6">
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input class="input-field" type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" minlength="6">
      </div>

      <button class="btn-submit" type="submit" id="submitBtn">
        <span>🚀 Register & Start</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in here →</a>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const registerForm = document.getElementById('registerForm');
    const submitBtn    = document.getElementById('submitBtn');
    const errorBox     = document.getElementById('errorBox');
    const errorMsg     = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.style.display = 'flex';
      errorBox.style.animation = 'none';
      void errorBox.offsetWidth; // Trigger reflow
      errorBox.style.animation = 'shake 0.3s ease';
    }

    function hideError() {
      errorBox.style.display = 'none';
    }

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      
      const fullName = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // 1. Password validation
      if (password !== confirmPassword) {
        showError("Passwords do not match. Please verify.");
        return;
      }

      submitBtn.disabled = true;
      const origText = submitBtn.innerHTML;
      submitBtn.innerHTML = '⏳ Creating account...';

      // Wait for Firebase to finish initializing
      await window.firebaseReady;

      try {
        // 2. Create Auth User
        const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // 3. Update Display Name
        await user.updateProfile({ displayName: fullName });
        
        // 4. Initialize Firestore document with default schema
        const initialDoc = {
          name: fullName,
          email: email,
          level: 1,
          scores: {},
          badges: [],
          streak: 1,
          lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
          role: "student"
        };
        
        await window.db.collection('users').doc(user.uid).set(initialDoc);
        
        // Redirect is handled automatically by onAuthStateChanged inside firebase-config.js
      } catch (error) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = origText;
        console.error("Signup error:", error);
        
        // Custom error messages
        switch (error.code) {
          case 'auth/email-already-in-use':
            showError("This email address is already registered.");
            break;
          case 'auth/invalid-email':
            showError("Please enter a valid email address.");
            break;
          case 'auth/weak-password':
            showError("Password is too weak. Please choose a stronger password.");
            break;
          default:
            showError(error.message);
        }
      }
    });
  </script>
</body>
</html>
